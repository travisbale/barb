services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  miraged:
    build:
      context: ../mirage
    container_name: miraged
    user: root
    ports:
      - "4443:443"    # HTTPS (API + proxy)
    volumes:
      - ./dev/miraged.yaml:/etc/mirage/miraged.yaml:ro
      - miraged-data:/var/lib/mirage

volumes:
  miraged-data:
